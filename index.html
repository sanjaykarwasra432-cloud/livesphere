<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveSphere</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }

        h1 {
            margin-bottom: 20px;
        }

        button {
            background: #4285F4;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            opacity: 0.9;
        }

        #userInfo {
            margin-top: 20px;
            display: none;
        }

        img {
            border-radius: 50%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>LiveSphere</h1>

        <button onclick="loginWithGoogle()">
            Google से Login करें
        </button>

        <div id="userInfo">
            <h3 id="userName"></h3>
            <p id="userEmail"></p>
            <img id="userPhoto" width="100">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

        import {
            getAuth,
            GoogleAuthProvider,
            signInWithPopup
        } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

        const firebaseConfig = {
  apiKey: "AIzaSyBdrls-3ELC3Z2oR3EoAXaR3nZp0CEApsM",
  authDomain: "livesphere-3bb80.firebaseapp.com",
  projectId: "livesphere-3bb80",
  storageBucket: "livesphere-3bb80.firebasestorage.app",
  messagingSenderId: "808784573001",
  appId: "1:808784573001:web:dfda2b7b4cb7fa2f3d4598"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const provider = new GoogleAuthProvider();

        async function loginWithGoogle() {
            try {
                const result = await signInWithPopup(auth, provider);

                const user = result.user;

                document.getElementById("userInfo").style.display = "block";
                document.getElementById("userName").innerText = user.displayName;
                document.getElementById("userEmail").innerText = user.email;
                document.getElementById("userPhoto").src = user.photoURL;

                console.log("Login Successful");
            } catch (error) {
                console.error(error);
                alert(error.message);
            }
        }

        window.loginWithGoogle = loginWithGoogle;
    </script>

</body>
</html>
