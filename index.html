<html lang="hi">
<head>
  <meta charset="UTF-8">

  <title>LiveSphere</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f5f5f5;
      text-align:center;
      padding:20px;
    }

    h1{
      color:#2196F3;
    }

    button{
      padding:12px 20px;
      margin:10px;
      border:none;
      border-radius:8px;
      background:#2196F3;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    #userInfo{
      background:white;
      padding:15px;
      border-radius:10px;
      margin-top:20px;
    }

    #adminPanel{
      display:none;

      padding:20px;
      border-radius:10px;
      margin-top:20px;
    }

    img{
      border-radius:50%;
    }
  </style>

<body>

  <h1>LiveSphere</h1>
  <p>Stay Ahead, Stay Live</p>

  <button onclick="loginWithGoogle()">
    Google Login
  </button>

  <button onclick="logoutUser()">
    Logout
  </button>

  <button onclick="enableNotifications()">
    Enable Notifications
  </button>

  <div id="userInfo"></div>

  <div id="adminPanel">
    <h2>Admin Panel</h2>
    <button>Add News</button>
  </div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

import {
  getMessaging,
  getToken
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-messaging.js";


// Firebase Config

const firebaseConfig = {
  apiKey: "AIzaSyBdrls-3ELC3Z2oR3EoAXaR3nZp0CEApsM",
  authDomain: "livesphere-3bb80.firebaseapp.com",
  projectId: "livesphere-3bb80",
  storageBucket: "livesphere-3bb80.firebasestorage.app",
  messagingSenderId: "808784573001",
  appId: "1:808784573001:web:dfda2b7b4cb7fa2f3d4598"
};


// Initialize Firebase

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const messaging = getMessaging(app);

const provider = new GoogleAuthProvider();


// Google Login

async function loginWithGoogle(){

  try{

    const result = await signInWithPopup(auth, provider);

    const user = result.user;

    console.log("UID:", user.uid);

    await setDoc(doc(db, "users", user.uid), {

      uid: user.uid,
      name: user.displayName,
      email: user.email,
      photo: user.photoURL,
      createdAt: new Date().toISOString()

    });

    alert("Login Successful");

  }

  catch(error){

    alert(error.message);
    console.log(error);

  }

}

window.loginWithGoogle = loginWithGoogle;


// Logout

async function logoutUser(){

  try{

    await signOut(auth);

    alert("Logout Successful");

    location.reload();

  }

  catch(error){

    console.log(error);

  }

}

window.logoutUser = logoutUser;


// User Check

onAuthStateChanged(auth, async (user)=>{

  if(user){

    document.getElementById("userInfo").innerHTML = `

      <h3>Welcome ${user.displayName}</h3>

      <img src="${user.photoURL}" width="100">

      <p>${user.email}</p>

    `;

    // Admin Check

    const adminRef = doc(db,"admins",user.uid);

    const adminSnap = await getDoc(adminRef);

    if(adminSnap.exists()){

      document.getElementById("adminPanel").style.display="block";

    }

  }

});


// Generate Device Token

async function generateDeviceToken(){

  try{

    const token = await getToken(messaging, {

      vapidKey: "BKwdPrnDmO-hk1FvqipY3l4WA81DBpWibqt_JKE3NXKPdlCiQMPLc4UDC27_9PjZLsZFdss1DAE2bnmQCONB_pI"

    });

    if(token){

      alert("Device Token:\n\n" + token);

    }else{

      alert("Token Generate Nahi Hua");

    }

  }

  catch(error){

    alert("Error:\n\n" + error.message);

    console.log(error);

  }

}


// Notification Permission

async function enableNotifications(){

  const permission = await Notification.requestPermission();

  if(permission === "granted"){

    alert("Notifications Enabled");

    generateDeviceToken();

  }

  else{

    alert("Notification Permission Denied");

  }

}

window.enableNotifications = enableNotifications;

</script>

</body>
